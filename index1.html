 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeroNote</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            'display': ['Space Grotesk', 'sans-serif'],
            'mono': ['JetBrains Mono', 'monospace']
          }
        }
      }
    }
  </script>
  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #8b5cf6; }
    
    /* Textarea styling */
    .note-area {
      resize: none;
      background: transparent;
    }
    .note-area:focus {
      outline: none;
    }
    
    /* Glow effects */
    .glow-purple {
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
    }
    
    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #a78bfa 0%, #c084fc 50%, #e879f9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Button hover effects */
    .btn-glow:hover {
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
    }
    
    /* Animated background */
    .animated-bg {
      background: linear-gradient(-45deg, #0f0f0f, #1a1a2e, #16213e, #1a1a2e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }
    
    .light-animated-bg {
      background: linear-gradient(-45deg, #faf5ff, #f3e8ff, #ede9fe, #f5f3ff);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }
    
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* Toast animation */
    .toast-enter {
      animation: slideIn 0.3s ease-out;
    }
    
    @keyframes slideIn {
      from {
        transform: translateY(-20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full font-display">

   <!-- Toast Container -->
   <div id="toast-container" class="fixed top-4 right-4 z-50"></div><!-- Main Container -->
   <div class="min-h-full p-4 md:p-8">

     <header class="flex items-center justify-between mb-4 sm:mb-6">

       <!-- Logo --> <img src="https://img.sanishtech.com/u/9ede26165895179d6f97ed72328449ea.png" alt="ZeroNote Logo" class="w-8 sm:w-10 h-8 sm:h-10 rounded-lg sm:rounded-xl glow-purple object-cover" loading="lazy">
       <h1 id="app-title" class="text-lg sm:text-2xl md:text-3xl font-bold gradient-text">ZeroNote</h1>
      </div><!-- Theme Toggle --> <button id="theme-toggle" class="p-2 sm:p-3 rounded-lg sm:rounded-xl bg-white/10 dark:bg-black/20 backdrop-blur-sm border border-purple-500/30 hover:border-purple-400 transition-all btn-glow">
       <svg id="sun-icon" class="w-4 sm:w-5 h-4 sm:h-5 text-purple-300 hidden" fill="none" stroke="currentColor" viewbox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />

       </svg></button>

       <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24">

       </svg><span class="hidden sm:inline">Download .txt</span><span class="sm:hidden">.txt</span></button> <button id="clear-btn" class="flex items-center gap-2 px-3 sm:px-4 py-2 sm:py-2.5 rounded-lg sm:rounded-xl text-xs sm:text-sm bg-red-900/30 border border-red-500/30 text-red-400 font-medium hover:bg-red-800/40 hover:border-red-400 transition-all ml-auto">

  </div><!-- Hidden canvas for image export -->
  <canvas id="export-canvas" style="display: none;"></canvas>
  <script>
    // Default configuration
    const defaultConfig = {
      app_title: 'ZeroNote',
      placeholder_text: 'Tulis catatanmu di sini...',
      background_color: '#0f0f0f',
      primary_color: '#8b5cf6',
      text_color: '#e9d5ff',
      accent_color: '#c084fc',
      surface_color: '#1a1a2e',
      is_dark_mode: true
    };
    
    let config = { ...defaultConfig };
    
    // DOM Elements
    const appEl = document.getElementById('app');
    const titleEl = document.getElementById('app-title');
    const noteContent = document.getElementById('note-content');
    const charCount = document.getElementById('char-count');
    const downloadTxtBtn = document.getElementById('download-txt-btn');
    const clearBtn = document.getElementById('clear-btn');
    const themeToggle = document.getElementById('theme-toggle');
    const sunIcon = document.getElementById('sun-icon');
    const moonIcon = document.getElementById('moon-icon');
    const editorCard = document.getElementById('editor-card');
    
    // Toast notification
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const bgColor = type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-purple-600';
      toast.className = `toast-enter ${bgColor} text-white px-4 py-3 rounded-xl shadow-lg mb-2 flex items-center gap-2`;
      toast.innerHTML = `
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          ${type === 'success' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>' : 
            type === 'error' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>' :
            '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'}
        </svg>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    // Update character count
    function updateCharCount() {
      const count = noteContent.value.length;
      charCount.textContent = `${count} karakter`;
    }
    
    // Toggle theme
    function toggleTheme() {
      config.is_dark_mode = !config.is_dark_mode;
      applyTheme();
      if (window.elementSdk) {
        window.elementSdk.setConfig({ is_dark_mode: config.is_dark_mode });
      }
    }
    
    // Apply theme
    function applyTheme() {
      if (config.is_dark_mode) {
        document.documentElement.classList.add('dark');
        appEl.classList.remove('light-animated-bg');
        appEl.classList.add('animated-bg');
        editorCard.classList.remove('bg-white/80');
        editorCard.classList.add('bg-black/40');
        noteContent.classList.remove('text-purple-900', 'placeholder-purple-400/50');
        noteContent.classList.add('text-purple-100', 'placeholder-purple-500/50');
        sunIcon.classList.remove('hidden');
        moonIcon.classList.add('hidden');
      } else {
        document.documentElement.classList.remove('dark');
        appEl.classList.remove('animated-bg');
        appEl.classList.add('light-animated-bg');
        editorCard.classList.remove('bg-black/40');
        editorCard.classList.add('bg-white/80');
        noteContent.classList.remove('text-purple-100', 'placeholder-purple-500/50');
        noteContent.classList.add('text-purple-900', 'placeholder-purple-400/50');
        sunIcon.classList.add('hidden');
        moonIcon.classList.remove('hidden');
      }
    }
    
    // Download as text file
    function downloadAsText() {
      const content = noteContent.value;
      if (!content.trim()) {
        showToast('Catatan kosong!', 'info');
        return;
      }
      
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `zeronote-${new Date().toISOString().slice(0,10)}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('File .txt berhasil diunduh!', 'success');
    }
    
    // Clear note with inline confirmation
    let clearConfirmTimeout = null;
    let isConfirmingClear = false;
    
    function handleClear() {
      if (!isConfirmingClear) {
        // First click - show confirmation
        isConfirmingClear = true;
        clearBtn.innerHTML = `
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
          <span>Yakin hapus?</span>
        `;
        clearBtn.classList.add('bg-red-600/50');
        
        clearConfirmTimeout = setTimeout(() => {
          resetClearButton();
        }, 3000);
      } else {
        // Second click - confirm clear
        if (clearConfirmTimeout) clearTimeout(clearConfirmTimeout);
        
        noteContent.value = '';
        updateCharCount();
        showToast('Catatan dihapus!', 'success');
        resetClearButton();
      }
    }
    
    function resetClearButton() {
      isConfirmingClear = false;
      clearBtn.innerHTML = `
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
        <span>Hapus</span>
      `;
      clearBtn.classList.remove('bg-red-600/50');
    }
    
    // Element SDK config change handler
    async function onConfigChange(newConfig) {
      config = { ...defaultConfig, ...newConfig };
      
      // Update title
      titleEl.textContent = config.app_title || defaultConfig.app_title;
      
      // Update placeholder
      noteContent.placeholder = config.placeholder_text || defaultConfig.placeholder_text;
      
      // Apply theme
      applyTheme();
    }
    
    // Map to capabilities
    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => {
              config.background_color = value;
              window.elementSdk.setConfig({ background_color: value });
            }
          },
          {
            get: () => config.primary_color || defaultConfig.primary_color,
            set: (value) => {
              config.primary_color = value;
              window.elementSdk.setConfig({ primary_color: value });
            }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => {
              config.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }
    
    // Map to edit panel values
    function mapToEditPanelValues(config) {
      return new Map([
        ['app_title', config.app_title || defaultConfig.app_title],
        ['placeholder_text', config.placeholder_text || defaultConfig.placeholder_text]
      ]);
    }
    
    // Event listeners
    noteContent.addEventListener('input', () => {
      updateCharCount();
    });
    
    downloadTxtBtn.addEventListener('click', downloadAsText);
    clearBtn.addEventListener('click', handleClear);
    themeToggle.addEventListener('click', toggleTheme);
    
    // Initialize
    async function init() {
      // Initialize Element SDK
      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange,
          mapToCapabilities,
          mapToEditPanelValues
        });
      }
      
      // Apply initial theme
      applyTheme();
      updateCharCount();
    }
    
    init();
  </script>
